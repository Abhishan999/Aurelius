<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Aurelius Finance</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0f;--bg2:#111118;--bg3:#1a1a24;--bg4:#22222e;
  --border:#ffffff14;--border2:#ffffff22;
  --text:#f0f0f8;--text2:#9090a8;--text3:#5a5a70;
  --accent:#c8a96e;--accent2:#e8c98e;--accent3:#a8893e;
  --green:#4ecb8d;--red:#f06b6b;--blue:#6b9cf0;--purple:#a06bf0;
  --card-r:14px;--r:8px;
  font-family:'DM Sans',sans-serif;
}
body{background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
.serif{font-family:'DM Serif Display',serif}

/* Scrollbar */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* Layout */
.app{display:flex;min-height:100vh}
.sidebar{width:220px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:100;transition:transform .3s}
.sidebar-logo{padding:24px 20px 16px;border-bottom:1px solid var(--border)}
.logo-mark{width:32px;height:32px;background:linear-gradient(135deg,var(--accent),var(--accent3));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;color:#000;font-weight:700;font-family:'DM Serif Display',serif}
.logo-text{font-size:15px;font-weight:600;letter-spacing:.5px;margin-top:2px}
.logo-sub{font-size:10px;color:var(--text3);letter-spacing:1px;text-transform:uppercase}

.nav{padding:12px 0;flex:1}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 20px;cursor:pointer;color:var(--text2);font-size:13px;font-weight:500;transition:all .15s;position:relative}
.nav-item:hover{color:var(--text);background:var(--bg3)}
.nav-item.active{color:var(--accent);background:linear-gradient(90deg,rgba(200,169,110,.12),transparent)}
.nav-item.active::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:var(--accent);border-radius:0 2px 2px 0}
.nav-icon{font-size:15px;width:18px;text-align:center}
.nav-section{font-size:10px;color:var(--text3);letter-spacing:1.5px;text-transform:uppercase;padding:16px 20px 6px;font-weight:500}

.sidebar-bottom{padding:16px;border-top:1px solid var(--border)}
.role-badge{display:flex;align-items:center;gap:8px;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r);padding:8px 12px;cursor:pointer;transition:all .2s}
.role-badge:hover{border-color:var(--accent);background:var(--bg4)}
.role-dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green)}
.role-dot.admin{background:var(--accent);box-shadow:0 0 6px var(--accent)}

.main{margin-left:220px;flex:1;min-height:100vh;display:flex;flex-direction:column}
.topbar{height:56px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 28px;position:sticky;top:0;z-index:50;backdrop-filter:blur(8px)}
.topbar-title{font-size:13px;color:var(--text3)}
.topbar-right{display:flex;align-items:center;gap:12px}
.theme-toggle{background:var(--bg3);border:1px solid var(--border2);color:var(--text2);border-radius:var(--r);padding:6px 10px;cursor:pointer;font-size:13px;transition:all .2s;font-family:'DM Sans',sans-serif}
.theme-toggle:hover{border-color:var(--accent);color:var(--accent)}
.export-btn{background:var(--accent);color:#000;border:none;border-radius:var(--r);padding:7px 14px;cursor:pointer;font-size:12px;font-weight:600;font-family:'DM Sans',sans-serif;letter-spacing:.3px;transition:all .2s}
.export-btn:hover{background:var(--accent2);transform:translateY(-1px)}

.page{padding:28px;flex:1}
.page-header{margin-bottom:24px}
.page-title{font-size:22px;font-weight:400;font-family:'DM Serif Display',serif;letter-spacing:-.3px}
.page-sub{font-size:13px;color:var(--text2);margin-top:2px}

/* Cards */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--card-r);padding:20px}
.card-sm{padding:16px}
.cards-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:20px}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--card-r);padding:20px;position:relative;overflow:hidden;transition:border-color .2s}
.stat-card:hover{border-color:var(--border2)}
.stat-card::after{content:'';position:absolute;top:0;right:0;width:60px;height:60px;border-radius:50%;opacity:.06;transform:translate(20px,-20px)}
.stat-card.green::after{background:var(--green)}
.stat-card.red::after{background:var(--red)}
.stat-card.blue::after{background:var(--blue)}
.stat-card.gold::after{background:var(--accent)}
.stat-label{font-size:11px;color:var(--text3);letter-spacing:1px;text-transform:uppercase;font-weight:500;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.stat-icon{font-size:13px}
.stat-value{font-size:26px;font-weight:300;letter-spacing:-1px;font-family:'DM Serif Display',serif}
.stat-change{font-size:11px;margin-top:8px;display:flex;align-items:center;gap:4px}
.stat-change.pos{color:var(--green)}
.stat-change.neg{color:var(--red)}

/* Charts row */
.charts-row{display:grid;grid-template-columns:2fr 1fr;gap:16px;margin-bottom:20px}
.chart-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.chart-title{font-size:14px;font-weight:500}
.chart-sub{font-size:11px;color:var(--text3);margin-top:2px}
.period-tabs{display:flex;gap:4px;background:var(--bg3);border-radius:var(--r);padding:3px}
.period-tab{font-size:11px;padding:4px 10px;border-radius:6px;cursor:pointer;color:var(--text2);transition:all .15s;font-family:'DM Sans',sans-serif;border:none;background:transparent}
.period-tab.active{background:var(--bg2);color:var(--text);border:1px solid var(--border)}
.chart-wrap{position:relative;width:100%}

/* Donut legend */
.donut-legend{margin-top:14px;display:flex;flex-direction:column;gap:8px}
.legend-item{display:flex;align-items:center;justify-content:space-between;font-size:12px}
.legend-left{display:flex;align-items:center;gap:8px;color:var(--text2)}
.legend-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}
.legend-pct{color:var(--text);font-weight:500}

/* Transactions */
.tx-toolbar{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.search-wrap{position:relative;flex:1;min-width:200px}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:13px;color:var(--text3)}
.tx-search{width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:var(--r);padding:8px 12px 8px 32px;font-size:13px;font-family:'DM Sans',sans-serif;outline:none;transition:border-color .2s}
.tx-search:focus{border-color:var(--accent)}
.tx-search::placeholder{color:var(--text3)}
.filter-sel{background:var(--bg3);border:1px solid var(--border);color:var(--text2);border-radius:var(--r);padding:8px 10px;font-size:12px;font-family:'DM Sans',sans-serif;outline:none;cursor:pointer;transition:border-color .2s}
.filter-sel:focus,.filter-sel:hover{border-color:var(--border2)}

.tx-table{width:100%;border-collapse:collapse}
.tx-table th{font-size:10px;color:var(--text3);letter-spacing:1px;text-transform:uppercase;padding:8px 12px;text-align:left;font-weight:500;border-bottom:1px solid var(--border);cursor:pointer;user-select:none;white-space:nowrap}
.tx-table th:hover{color:var(--text2)}
.sort-icon{margin-left:4px;opacity:.4}
.tx-table td{padding:12px;font-size:13px;border-bottom:1px solid var(--border)}
.tx-row:hover td{background:var(--bg3)}
.tx-row:last-child td{border-bottom:none}
.tx-desc{font-weight:500;color:var(--text)}
.tx-date{color:var(--text3);font-size:12px}
.tx-cat{font-size:11px;color:var(--text2)}
.cat-pill{display:inline-block;padding:3px 8px;border-radius:20px;font-size:10px;font-weight:500;letter-spacing:.3px}
.amount-pos{color:var(--green);font-weight:500}
.amount-neg{color:var(--text);font-weight:500}
.type-badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;padding:3px 8px;border-radius:20px;font-weight:500}
.type-income{background:rgba(78,203,141,.12);color:var(--green)}
.type-expense{background:rgba(240,107,107,.1);color:var(--red)}

.pagination{display:flex;align-items:center;justify-content:space-between;margin-top:16px;padding-top:12px;border-top:1px solid var(--border)}
.page-info{font-size:12px;color:var(--text3)}
.page-btns{display:flex;gap:6px}
.page-btn{background:var(--bg3);border:1px solid var(--border);color:var(--text2);border-radius:6px;padding:6px 12px;cursor:pointer;font-size:12px;font-family:'DM Sans',sans-serif;transition:all .15s}
.page-btn:hover{border-color:var(--border2);color:var(--text)}
.page-btn.active{background:var(--accent);color:#000;border-color:var(--accent)}
.page-btn:disabled{opacity:.3;cursor:default}

/* Insights */
.insights-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:20px}
.insight-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--card-r);padding:20px;position:relative;overflow:hidden}
.insight-tag{font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;margin-bottom:12px}
.insight-tag.warn{color:var(--accent)}
.insight-tag.good{color:var(--green)}
.insight-tag.info{color:var(--blue)}
.insight-title{font-size:18px;font-weight:400;font-family:'DM Serif Display',serif;margin-bottom:6px;line-height:1.3}
.insight-sub{font-size:12px;color:var(--text2);line-height:1.5}
.insight-val{font-size:32px;font-weight:300;font-family:'DM Serif Display',serif;margin:12px 0 4px}
.insight-bar{height:4px;background:var(--border);border-radius:2px;margin-top:12px;overflow:hidden}
.insight-bar-fill{height:100%;border-radius:2px;transition:width .5s}
.insight-accent{position:absolute;top:-20px;right:-20px;width:80px;height:80px;border-radius:50%;opacity:.06}
.insight-accent.gold{background:var(--accent)}
.insight-accent.green{background:var(--green)}
.insight-accent.blue{background:var(--blue)}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--card-r);width:100%;max-width:460px;padding:28px;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
.modal-title{font-size:18px;font-weight:400;font-family:'DM Serif Display',serif;margin-bottom:20px}
.form-row{margin-bottom:14px}
.form-label{font-size:11px;color:var(--text3);letter-spacing:.5px;text-transform:uppercase;margin-bottom:6px;font-weight:500}
.form-input,.form-select{width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:var(--r);padding:9px 12px;font-size:13px;font-family:'DM Sans',sans-serif;outline:none;transition:border-color .2s}
.form-input:focus,.form-select:focus{border-color:var(--accent)}
.form-input.error,.form-select.error{border-color:var(--red)}
.form-err{font-size:11px;color:var(--red);margin-top:4px}
.form-row-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.modal-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:24px;padding-top:16px;border-top:1px solid var(--border)}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text2);border-radius:var(--r);padding:8px 16px;cursor:pointer;font-size:13px;font-family:'DM Sans',sans-serif;transition:all .2s}
.btn-ghost:hover{border-color:var(--border2);color:var(--text)}
.btn-primary{background:var(--accent);color:#000;border:none;border-radius:var(--r);padding:8px 20px;cursor:pointer;font-size:13px;font-weight:600;font-family:'DM Sans',sans-serif;transition:all .2s}
.btn-primary:hover{background:var(--accent2)}
.btn-danger{background:rgba(240,107,107,.15);color:var(--red);border:1px solid rgba(240,107,107,.3);border-radius:var(--r);padding:6px 12px;cursor:pointer;font-size:12px;font-family:'DM Sans',sans-serif;transition:all .2s}
.btn-danger:hover{background:rgba(240,107,107,.25)}
.btn-edit{background:var(--bg3);color:var(--text2);border:1px solid var(--border);border-radius:var(--r);padding:6px 12px;cursor:pointer;font-size:12px;font-family:'DM Sans',sans-serif;transition:all .2s}
.btn-edit:hover{border-color:var(--border2);color:var(--text)}
.tx-actions{display:flex;gap:6px}

/* Toast */
.toast{position:fixed;bottom:20px;right:20px;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r);padding:12px 18px;font-size:13px;z-index:300;animation:slideIn .2s ease;display:flex;align-items:center;gap:10px}
@keyframes slideIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
.toast.success{border-color:rgba(78,203,141,.4);color:var(--green)}
.toast.error{border-color:rgba(240,107,107,.4);color:var(--red)}

/* Empty */
.empty-state{text-align:center;padding:48px 20px;color:var(--text3)}
.empty-icon{font-size:36px;margin-bottom:12px;opacity:.4}
.empty-title{font-size:14px;font-weight:500;color:var(--text2);margin-bottom:4px}
.empty-sub{font-size:12px}

/* Responsive */
@media(max-width:900px){
  .sidebar{transform:translateX(-100%)}
  .main{margin-left:0}
  .cards-grid{grid-template-columns:1fr 1fr}
  .charts-row{grid-template-columns:1fr}
  .insights-grid{grid-template-columns:1fr 1fr}
}
@media(max-width:600px){
  .cards-grid{grid-template-columns:1fr}
  .insights-grid{grid-template-columns:1fr}
  .page{padding:16px}
  .charts-row{gap:12px}
}
.light-mode{
  --bg:#f4f3ee;--bg2:#ffffff;--bg3:#f0ede8;--bg4:#e8e5e0;
  --border:#00000010;--border2:#00000018;
  --text:#1a1a2e;--text2:#5a5a70;--text3:#9090a8;
  --accent:#8b5e2a;--accent2:#a0702a;--accent3:#6b441a;
}
.light-mode .stat-card{background:#fff}
.light-mode .topbar{background:rgba(244,243,238,.9)}
.light-mode .sidebar{background:#faf9f6;border-right-color:#00000010}
.light-mode .nav-item.active{background:linear-gradient(90deg,rgba(139,94,42,.1),transparent)}
</style>

<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback,useMemo,createContext,useContext,useReducer}=React;

// ─── MOCK DATA ────────────────────────────────────────────────────
const CATEGORIES=['Food','Transport','Shopping','Health','Entertainment','Utilities','Salary','Freelance','Investment'];
const CAT_COLORS={'Food':'#f06b6b','Transport':'#6b9cf0','Shopping':'#a06bf0','Health':'#4ecb8d','Entertainment':'#f0c46b','Utilities':'#6bf0f0','Salary':'#c8a96e','Freelance':'#a0f06b','Investment':'#f06bb0'};
const CAT_LIGHT={'Food':'rgba(240,107,107,.15)','Transport':'rgba(107,156,240,.15)','Shopping':'rgba(160,107,240,.15)','Health':'rgba(78,203,141,.15)','Entertainment':'rgba(240,196,107,.15)','Utilities':'rgba(107,240,240,.15)','Salary':'rgba(200,169,110,.15)','Freelance':'rgba(160,240,107,.15)','Investment':'rgba(240,107,176,.15)'};

function genTx(){
  const descs={'Food':['Zomato Order','Swiggy Delivery','Starbucks Coffee','Subway Lunch','McDonald\'s'],'Transport':['Uber Ride','Ola Cab','Metro Recharge','Petrol Station','Rapido Bike'],'Shopping':['Amazon Order','Flipkart Purchase','Myntra Clothes','Croma Electronics','Meesho'],'Health':['PharmEasy','Apollo Pharmacy','Gym Membership','Doctor Consultation','Yoga Class'],'Entertainment':['Netflix','Prime Video','Spotify','BookMyShow','Steam Game'],'Utilities':['Electricity Bill','Water Bill','Internet Plan','Gas Cylinder','DTH Recharge'],'Salary':['Monthly Salary','Performance Bonus','Annual Increment','Salary Credit'],'Freelance':['Client Payment','Design Project','Content Writing','Consulting Fee'],'Investment':['Mutual Fund','SIP Return','Dividend Credit','FD Interest']};
  const now=new Date();
  return Array.from({length:80},(_,i)=>{
    const cat=CATEGORIES[Math.floor(Math.random()*CATEGORIES.length)];
    const isIncome=['Salary','Freelance','Investment'].includes(cat);
    const daysAgo=Math.floor(Math.random()*90);
    const d=new Date(now); d.setDate(d.getDate()-daysAgo);
    const baseAmt=isIncome?Math.floor(Math.random()*40000+5000):Math.floor(Math.random()*3000+100);
    return {id:`tx-${i+1}`,date:d.toISOString().split('T')[0],description:descs[cat][Math.floor(Math.random()*descs[cat].length)],amount:baseAmt,category:cat,type:isIncome?'Income':'Expense'};
  }).sort((a,b)=>new Date(b.date)-new Date(a.date));
}

const INITIAL_TX=JSON.parse(localStorage.getItem('aurelius_tx')||'null')||genTx();

function getMonthlyData(txs){
  const months={};
  txs.forEach(t=>{
    const m=t.date.slice(0,7);
    if(!months[m])months[m]={income:0,expense:0,label:''};
    if(t.type==='Income')months[m].income+=t.amount;
    else months[m].expense+=t.amount;
  });
  const keys=Object.keys(months).sort().slice(-6);
  return keys.map(k=>{
    const [y,mo]=k.split('-');
    const label=new Date(+y,+mo-1).toLocaleString('default',{month:'short'});
    return{...months[k],label,key:k,balance:months[k].income-months[k].expense};
  });
}

function getCatBreakdown(txs){
  const map={};
  txs.filter(t=>t.type==='Expense').forEach(t=>{
    map[t.category]=(map[t.category]||0)+t.amount;
  });
  const total=Object.values(map).reduce((a,b)=>a+b,0);
  return Object.entries(map).sort((a,b)=>b[1]-a[1]).map(([cat,amt])=>({cat,amt,pct:((amt/total)*100).toFixed(1)}));
}

// ─── STORE (Context + useReducer) ────────────────────────────────
const Store=createContext(null);
function reducer(state,action){
  switch(action.type){
    case'SET_PAGE':return{...state,page:action.v};
    case'SET_ROLE':return{...state,role:action.v};
    case'SET_THEME':return{...state,theme:action.v};
    case'ADD_TX':{const txs=[action.tx,...state.transactions];localStorage.setItem('aurelius_tx',JSON.stringify(txs));return{...state,transactions:txs};}
    case'EDIT_TX':{const txs=state.transactions.map(t=>t.id===action.tx.id?action.tx:t);localStorage.setItem('aurelius_tx',JSON.stringify(txs));return{...state,transactions:txs};}
    case'DEL_TX':{const txs=state.transactions.filter(t=>t.id!==action.id);localStorage.setItem('aurelius_tx',JSON.stringify(txs));return{...state,transactions:txs};}
    case'SET_FILTERS':return{...state,filters:{...state.filters,...action.v}};
    case'SET_TOAST':return{...state,toast:action.v};
    default:return state;
  }
}
const initState={
  transactions:INITIAL_TX,
  page:'dashboard',
  role:localStorage.getItem('aurelius_role')||'viewer',
  theme:localStorage.getItem('aurelius_theme')||'dark',
  filters:{search:'',type:'All',category:'All',sort:'date',sortDir:'desc',page:1},
  toast:null
};

function StoreProvider({children}){
  const [state,dispatch]=useReducer(reducer,initState);
  useEffect(()=>{localStorage.setItem('aurelius_role',state.role)},[state.role]);
  useEffect(()=>{localStorage.setItem('aurelius_theme',state.theme)},[state.theme]);
  return React.createElement(Store.Provider,{value:{state,dispatch}},children);
}
function useStore(){return useContext(Store);}

// ─── CUSTOM HOOKS ─────────────────────────────────────────────────
function useTransactions(){
  const {state}=useStore();
  const {transactions,filters}=state;
  const filtered=useMemo(()=>{
    let r=[...transactions];
    if(filters.search){const q=filters.search.toLowerCase();r=r.filter(t=>t.description.toLowerCase().includes(q)||t.category.toLowerCase().includes(q));}
    if(filters.type!=='All')r=r.filter(t=>t.type===filters.type);
    if(filters.category!=='All')r=r.filter(t=>t.category===filters.category);
    r.sort((a,b)=>{
      if(filters.sort==='date')return filters.sortDir==='desc'?new Date(b.date)-new Date(a.date):new Date(a.date)-new Date(b.date);
      if(filters.sort==='amount')return filters.sortDir==='desc'?b.amount-a.amount:a.amount-b.amount;
      return 0;
    });
    return r;
  },[transactions,filters]);
  const PER_PAGE=10;
  const total=filtered.length;
  const pages=Math.ceil(total/PER_PAGE);
  const paged=filtered.slice((filters.page-1)*PER_PAGE,filters.page*PER_PAGE);
  return{all:transactions,filtered,paged,total,pages,PER_PAGE};
}

function useInsights(){
  const {state:{transactions}}=useStore();
  return useMemo(()=>{
    const now=new Date();
    const thisM=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
    const lastM=`${now.getFullYear()}-${String(now.getMonth()).padStart(2,'0')}`;
    const thisMonthTx=transactions.filter(t=>t.date.startsWith(thisM));
    const lastMonthTx=transactions.filter(t=>t.date.startsWith(lastM));
    const thisExp=thisMonthTx.filter(t=>t.type==='Expense');
    const lastExp=lastMonthTx.filter(t=>t.type==='Expense');
    const thisTotal=thisExp.reduce((a,b)=>a+b.amount,0);
    const lastTotal=lastExp.reduce((a,b)=>a+b.amount,0);
    const thisInc=thisMonthTx.filter(t=>t.type==='Income').reduce((a,b)=>a+b.amount,0);
    const catMap={};
    thisExp.forEach(t=>{catMap[t.category]=(catMap[t.category]||0)+t.amount;});
    const topCat=Object.entries(catMap).sort((a,b)=>b[1]-a[1])[0];
    const catLastMap={};
    lastExp.filter(t=>topCat&&t.category===topCat[0]).forEach(t=>{catLastMap[t.category]=(catLastMap[t.category]||0)+t.amount;});
    const topCatLast=topCat?catLastMap[topCat[0]]||0:0;
    const catChange=topCat&&topCatLast>0?((topCat[1]-topCatLast)/topCatLast*100).toFixed(0):null;
    const totalChange=lastTotal>0?((thisTotal-lastTotal)/lastTotal*100).toFixed(0):null;
    const savingsRate=thisInc>0?(((thisInc-thisTotal)/thisInc)*100).toFixed(0):0;
    return{topCat,catChange,totalChange,thisTotal,lastTotal,thisInc,savingsRate};
  },[transactions]);
}

function Topbar(){
  const {state,dispatch}=useStore();
  const {all}=useTransactions();
  function exportCSV(){
    const h=['Date','Description','Category','Type','Amount (INR)'];
    const rows=all.map(t=>[t.date,t.description,t.category,t.type,t.amount]);
    const csv=[h,...rows].map(r=>r.join(',')).join('\n');
    const a=document.createElement('a');a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);
    a.download='aurelius_transactions.csv';a.click();
    dispatch({type:'SET_TOAST',v:{msg:'Exported transactions as CSV',type:'success'}});
    setTimeout(()=>dispatch({type:'SET_TOAST',v:null}),2500);
  }
  return(
    <div className="topbar">
      <span className="topbar-title">{new Date().toLocaleDateString('en-IN',{weekday:'long',month:'long',day:'numeric'})}</span>
      <div className="topbar-right">
        <button className="theme-toggle" onClick={()=>dispatch({type:'SET_THEME',v:state.theme==='dark'?'light':'dark'})}>
          {state.theme==='dark'?'☀ Light':'☾ Dark'}
        </button>
        <button className="export-btn" onClick={exportCSV}>↓ Export CSV</button>
      </div>
    </div>
  );
}

function StatCard({label,value,change,type,icon}){
  const pos=change&&!change.startsWith('-');
  return(
    <div className={`stat-card ${type}`}>
      <div className="stat-label"><span className="stat-icon">{icon}</span>{label}</div>
      <div className="stat-value">{value}</div>
      {change&&<div className={`stat-change ${pos?'pos':'neg'}`}><span>{pos?'▲':'▼'}</span>{change}</div>}
    </div>
  );
}

function LineChart({data}){
  const ref=useRef(null);
  const chartRef=useRef(null);
  useEffect(()=>{
    if(!ref.current||!data.length)return;
    if(chartRef.current)chartRef.current.destroy();
    chartRef.current=new Chart(ref.current,{
      type:'line',
      data:{
        labels:data.map(d=>d.label),
        datasets:[
          {label:'Income',data:data.map(d=>d.income),borderColor:'#4ecb8d',backgroundColor:'rgba(78,203,141,.08)',fill:true,tension:.4,pointRadius:4,pointBackgroundColor:'#4ecb8d',borderWidth:2},
          {label:'Expense',data:data.map(d=>d.expense),borderColor:'#f06b6b',backgroundColor:'rgba(240,107,107,.08)',fill:true,tension:.4,pointRadius:4,pointBackgroundColor:'#f06b6b',borderWidth:2},
        ]
      },
      options:{
        responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:false},tooltip:{backgroundColor:'#1a1a24',titleColor:'#f0f0f8',bodyColor:'#9090a8',borderColor:'#ffffff22',borderWidth:1,padding:10,callbacks:{label:ctx=>`${ctx.dataset.label}: INR ${ctx.raw.toLocaleString('en-IN')}`}}},
        scales:{x:{grid:{color:'rgba(255,255,255,.04)'},ticks:{color:'#5a5a70',font:{size:11}}},y:{grid:{color:'rgba(255,255,255,.04)'},ticks:{color:'#5a5a70',font:{size:11},callback:v=>`${(v/1000).toFixed(0)}k`}}}
      }
    });
    return()=>{if(chartRef.current)chartRef.current.destroy();};
  },[data]);
  return <div className="chart-wrap" style={{height:220}}><canvas ref={ref}/></div>;
}

function DonutChart({data}){
  const ref=useRef(null);
  const chartRef=useRef(null);
  useEffect(()=>{
    if(!ref.current||!data.length)return;
    if(chartRef.current)chartRef.current.destroy();
    chartRef.current=new Chart(ref.current,{
      type:'doughnut',
      data:{
        labels:data.slice(0,6).map(d=>d.cat),
        datasets:[{data:data.slice(0,6).map(d=>d.amt),backgroundColor:data.slice(0,6).map(d=>CAT_COLORS[d.cat]||'#888'),borderWidth:0,hoverOffset:6}]
      },
      options:{responsive:true,maintainAspectRatio:false,cutout:'72%',plugins:{legend:{display:false},tooltip:{backgroundColor:'#1a1a24',titleColor:'#f0f0f8',bodyColor:'#9090a8',borderColor:'#ffffff22',borderWidth:1,padding:10,callbacks:{label:ctx=>`INR ${ctx.raw.toLocaleString('en-IN')} (${((ctx.raw/data.slice(0,6).reduce((a,b)=>a+b.amt,0))*100).toFixed(1)}%)`}}}}
    });
    return()=>{if(chartRef.current)chartRef.current.destroy();};
  },[data]);
  return <div className="chart-wrap" style={{height:160}}><canvas ref={ref}/></div>;
}

function TxModal({tx,onClose}){
  const {dispatch}=useStore();
  const empty={description:'',amount:'',category:'Food',type:'Expense',date:new Date().toISOString().split('T')[0]};
  const [form,setForm]=useState(tx||empty);
  const [errs,setErrs]=useState({});
  function validate(){
    const e={};
    if(!form.description.trim())e.description='Description is required';
    if(!form.amount||isNaN(form.amount)||+form.amount<=0)e.amount='Enter a valid amount';
    if(!form.date)e.date='Date is required';
    return e;
  }
  function submit(){
    const e=validate();
    if(Object.keys(e).length){setErrs(e);return;}
    const t={...form,amount:+form.amount,id:tx?tx.id:`tx-${Date.now()}`};
    dispatch({type:tx?'EDIT_TX':'ADD_TX',tx:t});
    dispatch({type:'SET_TOAST',v:{msg:tx?'Transaction updated':'Transaction added',type:'success'}});
    setTimeout(()=>dispatch({type:'SET_TOAST',v:null}),2500);
    onClose();
  }
  const F=(f,v)=>setForm(p=>({...p,[f]:v}));
  return(
    <div className="modal-overlay" onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div className="modal">
        <div className="modal-title">{tx?'Edit Transaction':'Add Transaction'}</div>
        <div className="form-row">
          <div className="form-label">Description</div>
          <input className={`form-input${errs.description?' error':''}`} value={form.description} onChange={e=>F('description',e.target.value)} placeholder="e.g. Swiggy Order"/>
          {errs.description&&<div className="form-err">{errs.description}</div>}
        </div>
        <div className="form-row-2">
          <div className="form-row">
            <div className="form-label">Amount (INR)</div>
            <input className={`form-input${errs.amount?' error':''}`} type="number" value={form.amount} onChange={e=>F('amount',e.target.value)} placeholder="0"/>
            {errs.amount&&<div className="form-err">{errs.amount}</div>}
          </div>
          <div className="form-row">
            <div className="form-label">Date</div>
            <input className={`form-input${errs.date?' error':''}`} type="date" value={form.date} onChange={e=>F('date',e.target.value)}/>
          </div>
        </div>
        <div className="form-row-2">
          <div className="form-row">
            <div className="form-label">Type</div>
            <select className="form-select" value={form.type} onChange={e=>F('type',e.target.value)}>
              <option>Income</option><option>Expense</option>
            </select>
          </div>
          <div className="form-row">
            <div className="form-label">Category</div>
            <select className="form-select" value={form.category} onChange={e=>F('category',e.target.value)}>
              {CATEGORIES.map(c=><option key={c}>{c}</option>)}
            </select>
          </div>
        </div>
        <div className="modal-actions">
          <button className="btn-ghost" onClick={onClose}>Cancel</button>
          <button className="btn-primary" onClick={submit}>{tx?'Update':'Add Transaction'}</button>
        </div>
      </div>
    </div>
  );
}

function Transactions(){
  const {state,dispatch}=useStore();
  const {filtered,paged,total,pages,PER_PAGE}=useTransactions();
  const [modal,setModal]=useState(null);
  const isAdmin=state.role==='admin';
  function setF(v){dispatch({type:'SET_FILTERS',v:{...v,page:1}});}
  function sort(f){
    const dir=state.filters.sort===f&&state.filters.sortDir==='desc'?'asc':'desc';
    dispatch({type:'SET_FILTERS',v:{sort:f,sortDir:dir}});
  }
  function del(id){
    if(!window.confirm('Delete this transaction?'))return;
    dispatch({type:'DEL_TX',id});
    dispatch({type:'SET_TOAST',v:{msg:'Transaction deleted',type:'success'}});
    setTimeout(()=>dispatch({type:'SET_TOAST',v:null}),2500);
  }
  const si=state.filters.sort;const sd=state.filters.sortDir;
  const SIcon=({f})=><span className="sort-icon">{si===f?(sd==='desc'?'↓':'↑'):'↕'}</span>;
  return(
    <div className="page">
      <div className="page-header" style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',flexWrap:'wrap',gap:12}}>
        <div><div className="page-title serif">Transactions</div><div className="page-sub">{total} records found</div></div>
        {isAdmin&&<button className="btn-primary" style={{padding:'10px 18px'}} onClick={()=>setModal('new')}>+ Add Transaction</button>}
      </div>
      <div className="card">
        <div className="tx-toolbar">
          <div className="search-wrap">
            <span className="search-icon">⌕</span>
            <input className="tx-search" placeholder="Search transactions..." value={state.filters.search} onChange={e=>setF({search:e.target.value})}/>
          </div>
          <select className="filter-sel" value={state.filters.type} onChange={e=>setF({type:e.target.value})}>
            <option>All</option><option>Income</option><option>Expense</option>
          </select>
          <select className="filter-sel" value={state.filters.category} onChange={e=>setF({category:e.target.value})}>
            <option value="All">All Categories</option>
            {CATEGORIES.map(c=><option key={c}>{c}</option>)}
          </select>
        </div>
        {paged.length===0?(
          <div className="empty-state">
            <div className="empty-icon">◎</div>
            <div className="empty-title">No transactions found</div>
            <div className="empty-sub">Try adjusting your search or filters</div>
          </div>
        ):(
          <>
          <div style={{overflowX:'auto'}}>
          <table className="tx-table">
            <thead>
              <tr>
                <th onClick={()=>sort('date')}>Date<SIcon f="date"/></th>
                <th>Description</th>
                <th>Category</th>
                <th>Type</th>
                <th onClick={()=>sort('amount')} style={{textAlign:'right'}}>Amount<SIcon f="amount"/></th>
                {isAdmin&&<th style={{textAlign:'right'}}>Actions</th>}
              </tr>
            </thead>
            <tbody>
              {paged.map(t=>(
                <tr key={t.id} className="tx-row">
                  <td><div className="tx-date">{new Date(t.date).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'2-digit'})}</div></td>
                  <td><div className="tx-desc">{t.description}</div></td>
                  <td><span className="cat-pill" style={{background:CAT_LIGHT[t.category]||'rgba(144,144,168,.12)',color:CAT_COLORS[t.category]||'var(--text2)'}}>{t.category}</span></td>
                  <td><span className={`type-badge ${t.type==='Income'?'type-income':'type-expense'}`}>{t.type==='Income'?'▲':'▼'} {t.type}</span></td>
                  <td style={{textAlign:'right'}}><span className={t.type==='Income'?'amount-pos':'amount-neg'}>{t.type==='Income'?'+':'-'}INR {t.amount.toLocaleString('en-IN')}</span></td>
                  {isAdmin&&<td style={{textAlign:'right'}}><div className="tx-actions" style={{justifyContent:'flex-end'}}><button className="btn-edit" onClick={()=>setModal(t)}>Edit</button><button className="btn-danger" onClick={()=>del(t.id)}>Del</button></div></td>}
                </tr>
              ))}
            </tbody>
          </table>
          </div>
          <div className="pagination">
            <span className="page-info">Showing {(state.filters.page-1)*PER_PAGE+1}–{Math.min(state.filters.page*PER_PAGE,total)} of {total}</span>
            <div className="page-btns">
              <button className="page-btn" disabled={state.filters.page===1} onClick={()=>dispatch({type:'SET_FILTERS',v:{page:state.filters.page-1}})}>←</button>
              {Array.from({length:Math.min(pages,5)},(_,i)=>{
                const p=state.filters.page<=3?i+1:i+state.filters.page-2;
                if(p>pages)return null;
                return <button key={p} className={`page-btn${p===state.filters.page?' active':''}`} onClick={()=>dispatch({type:'SET_FILTERS',v:{page:p}})}>{p}</button>;
              })}
              <button className="page-btn" disabled={state.filters.page===pages} onClick={()=>dispatch({type:'SET_FILTERS',v:{page:state.filters.page+1}})}>→</button>
            </div>
          </div>
          </>
        )}
      </div>
      {modal&&<TxModal tx={modal==='new'?null:modal} onClose={()=>setModal(null)}/>}
    </div>
  );
}

function Insights(){

  const ins=useInsights();
  const monthly=useMemo(()=>getMonthlyData(transactions),[transactions]);
  const catData=useMemo(()=>getCatBreakdown(transactions),[transactions]);
  const fmt=v=>`INR ${v.toLocaleString('en-IN')}`;
  return(
    <div className="page">
      <div className="page-header">
        <div className="page-title serif">Spending Insights</div>
        <div className="page-sub">Smart observations based on your financial data</div>
      </div>
      <div className="insights-grid">
        <div className="insight-card">
          <div className="insight-accent gold"/>
          <div className="insight-tag warn">◈ Top Spending</div>
          <div className="insight-title">{ins.topCat?ins.topCat[0]:'—'} is your biggest expense</div>

        </div>
        <div className="insight-card">
          <div className="insight-accent green"/>
          <div className="insight-tag good">◎ Savings Health</div>
          <div className="insight-title">Savings rate this month</div>
          <div className="insight-val" style={{color:ins.savingsRate>20?'var(--green)':ins.savingsRate>10?'var(--accent)':'var(--red)'}}>{ins.savingsRate}%</div>

              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

function Toast(){
  const {state:{toast}}=useStore();
  if(!toast)return null;
  return <div className={`toast ${toast.type}`}><span>{toast.type==='success'?'✓':'✗'}</span>{toast.msg}</div>;
}

function App(){
  const {state}=useStore();
  useEffect(()=>{
    document.body.className=state.theme==='light'?'light-mode':'';
  },[state.theme]);
  const pages={dashboard:Dashboard,transactions:Transactions,insights:Insights};
  const Page=pages[state.page]||Dashboard;
  return(
    <div className="app">
      <Sidebar/>
      <div className="main">
        <Topbar/>
        <Page/>
      </div>
      <Toast/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(
  React.createElement(StoreProvider,null,React.createElement(App))
);
</script>
</body>
</html>
